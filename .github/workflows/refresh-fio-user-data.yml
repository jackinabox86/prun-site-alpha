name: Refresh FIO User Data (GCS)

on:
  schedule:
    # First day of each month at 02:00 UTC
    - cron: '0 2 1 * *'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (fetch data but skip GCS upload)'
        required: false
        type: boolean
        default: false

jobs:
  refresh:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Authenticate to Google Cloud
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: google-github-actions/setup-gcloud@v2

      - name: Fetch FIO user data
        env:
          FIO_API_KEY: ${{ secrets.FIO_API_KEY }}
        run: |
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            npx tsx scripts/fetch-fio-user-data.ts --dry-run
          else
            npx tsx scripts/fetch-fio-user-data.ts
          fi

      - name: Summary
        if: always()
        run: |
          echo "## FIO User Data Refresh" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Date:** $(date -u +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Mode:** ${{ github.event.inputs.dry_run == 'true' && 'Dry run' || 'Production' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          if [ -f public/data/fio-user-data.csv ]; then
            LINES=$(wc -l < public/data/fio-user-data.csv)
            echo "- **Rows written:** $((LINES - 1))" >> $GITHUB_STEP_SUMMARY
            echo "- **GCS path:** \`gs://prun-site-alpha-bucket/fio-user-data.csv\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Public URL:** https://storage.googleapis.com/prun-site-alpha-bucket/fio-user-data.csv" >> $GITHUB_STEP_SUMMARY
          fi
